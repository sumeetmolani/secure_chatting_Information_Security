<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="chat-page">

  <!-- ── SIDEBAR ────────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="sidebar-brand">
        <svg class="lock-icon" viewBox="0 0 24 24" fill="none">
          <rect x="4" y="11" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
        </svg>
        <span class="sidebar-title">SecureChat</span>
      </div>

      <div class="me-row">
        <div class="avatar me-avatar" id="me-avatar">?</div>
        <div class="me-info">
          <span class="me-name" id="me-name">Loading…</span>
          <span class="me-status online">● Online</span>
        </div>
        <button class="icon-btn logout-btn" onclick="doLogout()" title="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="sidebar-search">
      <input type="text" id="user-search"
             placeholder="Search users…"
             oninput="filterUsers(this.value)" />
    </div>

    <div class="contacts-label">CONTACTS</div>

    <ul class="contact-list" id="contact-list" role="listbox">
      <li class="contact-loading">Loading contacts…</li>
    </ul>

  </aside>

  <!-- ── CHAT AREA ──────────────────────────────────────────────────────── -->
  <main class="chat-main" id="chat-main">

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <h2>Select a contact</h2>
      <p>All messages are encrypted with AES-256-GCM.<br/>
         Only you and your recipient can read them.</p>
    </div>

    <!-- Active chat -->
    <div class="chat-area hidden" id="chat-area">

      <!-- Chat header -->
      <header class="chat-header">
        <div class="chat-peer-info">
          <div class="avatar peer-avatar" id="peer-avatar">?</div>
          <div>
            <div class="peer-name" id="peer-name">—</div>
            <div class="peer-status" id="peer-status"></div>
          </div>
        </div>
        <div class="chat-header-right">
          <!-- Decrypt toggle -->
          <button class="decrypt-toggle" id="decrypt-toggle"
                  onclick="toggleDecryption()" title="Toggle encrypted/decrypted view">
            <span class="dt-icon">🔒</span>
            <span class="dt-label" id="dt-label">Decrypted</span>
          </button>
          <button class="icon-btn mobile-back" onclick="showSidebar()" title="Back">
            ←
          </button>
        </div>
      </header>

      <!-- Messages -->
      <div class="messages-container" id="messages-container" role="log" aria-live="polite">
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator hidden" id="typing-indicator">
        <span id="typing-name"></span> is typing
        <span class="dots"><span></span><span></span><span></span></span>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="msg-input"
                    placeholder="Type an encrypted message…"
                    rows="1"
                    maxlength="4096"
                    onkeydown="handleMsgKey(event)"
                    oninput="autoResize(this)"></textarea>
          <span class="char-count" id="char-count">0/4096</span>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send (Enter)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"
          integrity="sha512-ERgZJ5YEpFjZB+uxUlgOyAJvnFTa7PdHpKt9Gj9/pf4LfBXYWgT9tnaWf0sMTKRJhBa8ACmvbMqFiYu6/p7w=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/static/js/chat.js"></script>

</body>
</html>
